<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .cloud_one{
            position:absolute;
            background-color: rgb(198, 235, 250);
            border: 3px solid black;
            border-radius: 50%;
            overflow:hidden;
        }
    </style>
</head>
<body>
    <div style="position:fixed;left:20%;top:10%;width:60%;height:80%;background-color:rgb(198, 235, 250);overflow: hidden;">
        <div style="position:absolute;height:8vw;width:8vw;left:3vh;top:3vh;overflow: hidden;">
            <div style="position:relative;height:190%;width:190%;border: 3px solid red;border-radius: 50%;left:-100%;top:-100%;"></div>
        </div>
        <div style="position:absolute;height:8vw;width:8vw;right:3vh;top:3vh;overflow: hidden;">
            <div style="position:relative;height:190%;width:190%;border: 3px solid red;border-radius: 50%;left:0%;top:-100%;"></div>
        </div>
        <div style="position:absolute;height:8vw;width:8vw;left:3vh;bottom:3vh;overflow: hidden;">
            <div style="position:relative;height:190%;width:190%;border: 3px solid red;border-radius: 50%;left:-100%;top:0%;"></div>
        </div>
        <div style="position:absolute;height:8vw;width:8vw;right:3vh;bottom:3vh;overflow: hidden;">
            <div style="position:relative;height:190%;width:190%;border: 3px solid red;border-radius: 50%;left:0%;top:0%;"></div>
        </div>
        <div style="position:absolute;top:3vh;background-color: red;height:3px;width:64%;left:17%"></div>
    </div>  
</body>

</html>
